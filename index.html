<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundo Pet</title>
    <link
      rel="shortcut icon"
      href="assets/dog-duotone.svg"
      type="image/x-icon"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@700&family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz@0,14..32;1,14..32&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="logo">
      <img src="assets/dog-duotone.svg" alt="" />
      <span>MUNDO PET</span>
    </div>

    <main class="container">
      <header>
        <div class="content">
          <h1>Sua agenda</h1>
          <p>
            Aqui você pode ver todos os clientes e serviços agendados para hoje.
          </p>
        </div>

        <label for="date" class="label">Data</label>
        <div class="input">
          <i><img src="assets/Calendar.svg" alt="Calendário" /></i>
          <input type="date" id="date" name="date" required />
          <img src="assets/arrow-down.svg" alt="" class="icon-arrow" />
        </div>
      </header>

      <section class="schedule">
        <div class="card-period-group">
          <div class="card-header">
            <h2 class="period-title">
              <img src="assets/Sun.svg" alt="" />
              Manhã
            </h2>
            <span>09h-12h</span>
          </div>

          <div class="card-info period-morning">
            <!-- <div class="card-info-row">
              <strong>09:00 </strong>
              <p><strong>Thor</strong>/ Fernanda Costa</p>
            </div>
            <p>Vacinação</p>
            <button type="button" class="btn-remove">
              Remover agendamento
            </button> -->
          </div>
        </div>

        <div class="card-period-group">
          <div class="card-header">
            <h2 class="period-title">
              <img src="assets/Cloud-Sun.svg" alt="" />
              Tarde
            </h2>
            <span>13h-18h</span>
          </div>

          <div class="card-info period-afternoon">
            <!-- <div class="card-info-row">
              <strong>15:00 </strong>
              <p><strong>Mel</strong>/ Fernando Reis</p>
            </div>
            <p>Cadastração</p>
            <button type="button" class="btn-remove">
              Remover agendamento
            </button> -->
          </div>
        </div>

        <div class="card-period-group">
          <div class="card-header">
            <h2 class="period-title">
              <img src="assets/Moon-Stars.svg" alt="" />
              Noite
            </h2>
            <span>19h-21h</span>
          </div>

          <div class="card-info period-night">
            <!-- <div class="card-info-row">
              <strong>20:00 </strong>
              <p><strong>Juca</strong>/ Michelli</p>
            </div>
            <p>Vacinação</p>
            <button type="button" class="btn-remove">
              Remover agendamento
            </button> -->
          </div>
        </div>
      </section>
    </main>
    <footer>
      <button type="button" class="new-schedule">Novo agendamento</button>
    </footer>

    <div class="modal-scheduling-overlay" id="modal-scheduling">
      <div class="modal-scheduling">
        <button type="button" class="btn-close" id="close-modal">
          <img src="assets/Close.svg" alt="botão de fechar modal" />
        </button>
        <header>
          <div class="modal-title">
            <h2>Agende um atendimento</h2>
            <p>Preencha os dados do cliente para realizar o agendamento:</p>
          </div>
        </header>

        <form>
          <div class="input-group">
            <label for="guardian">Nome do tutor</label>
            <div class="input-wrapper">
              <img src="assets/User.svg" alt="" />
              <input
                type="text"
                id="guardian"
                placeholder="Helena Souza"
                required
              />
            </div>
          </div>

          <div class="input-group">
            <label for="pet">Nome do pet</label>
            <div class="input-wrapper">
              <img src="assets/Pet-Paw.svg" alt="" />
              <input type="text" id="pet" placeholder="Cheddar" required />
            </div>
          </div>

          <div class="input-group">
            <label for="phone">Telefone</label>
            <div class="input-wrapper">
              <img src="assets/Phone.svg" alt="" />
              <input
                type="tel"
                id="phone"
                placeholder="Ex: 11999998888"
                inputmode="numeric"
                pattern="\d{11}"
                maxlength="11"
                minlength="11"
                onkeypress="
                  return event.charCode >= 48 && event.charCode <= 57;
                "
                required
              />
            </div>
          </div>

          <div class="input-group">
            <label for="service">Descrição do serviço</label>

            <textarea
              rows="3"
              name="service"
              id="service"
              placeholder="Banho e tosa"
              required
            ></textarea>
          </div>

          <div class="row">
            <div class="input-group">
              <label for="modal-date">Data</label>
              <div class="input-wrapper">
                <img src="assets/Calendar.svg" alt="" />
                <input type="date" id="modal-date" name="modal-date" required />
                <img src="assets/arrow-down.svg" alt="" class="icon-arrow" />
              </div>
            </div>

            <div class="input-group">
              <label for="time">Hora</label>
              <div class="input-wrapper">
                <img src="assets/Clock.svg" alt="" />
                <select name="time" id="time" required>
                  <option value="">--|--</option>
                  <option value="8:00">8:00h</option>
                  <option value="9:00">9:00h</option>
                  <option value="10:00">10:00h</option>
                  <option value="11:00">11:00h</option>
                  <option value="12:00">12:00h</option>
                  <option value="13:00">13:00h</option>
                  <option value="14:00">14:00h</option>
                  <option value="15:00">15:00h</option>
                  <option value="16:00">16:00h</option>
                  <option value="17:00">17:00h</option>
                  <option value="18:00">18:00h</option>
                  <option value="19:00">19:00h</option>
                  <option value="20:00">20:00h</option>
                </select>

                <img src="assets/arrow-down.svg" alt="" class="icon-arrow" />
              </div>
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btn-schedule">
            AGENDAR
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
